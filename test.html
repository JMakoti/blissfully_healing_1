<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lounge Cafe</title>

    <!-- FONT -->
    <link
      href="https://fonts.googleapis.com/css2?family=Baskervville:ital@0;1&display=swap"
      rel="stylesheet"
    />

    <style>
      /*  GLOBAL  */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Baskervville", serif;
      }

      body {
        background: #0b0c0c;
        color: #e8e6e3;
      }

      /*  HEADER  */
      .s-header {
        position: absolute;
        width: 100%;
        top: 0;
        z-index: 1000;
      }

      .s-header.scrolled {
        position: fixed;
        background: rgba(11, 12, 12, 0.95);
        backdrop-filter: blur(8px);
      }

      .s-header__content {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 25px 6%;
      }

      /* LOGO */
      .header-logo img {
        width: 50px;
      }

      /* NAV */
      .header-nav {
        display: flex;
        align-items: center;
        gap: 40px;
      }

      .header-nav__links {
        display: flex;
        list-style: none;
        gap: 30px;
      }

      .header-nav__links a {
        text-decoration: none;
        color: #9ca3af;
        font-size: 15px;
        transition: 0.3s;
      }

      .header-nav__links a:hover,
      .current a {
        color: #ffffff;
      }

      /* PHONE BUTTON */
      .header-contact__num {
        background: rgba(255, 255, 255, 0.08);
        padding: 10px 20px;
        border-radius: 30px;
        color: #e8e6e3;
        text-decoration: none;
        font-size: 14px;
      }

      /*  INTRO  */
      .s-intro {
        min-height: 100vh;
        display: flex;
        align-items: center;
        padding: 120px 6% 40px;
        position: relative;
      }

      /* GRID */
      .s-intro__content {
        display: grid;
        grid-template-columns: 1.2fr 1fr 1fr;
        gap: 60px;
        align-items: center;
        width: 100%;
      }

      /* LEFT TEXT */
      .intro-header__overline {
        font-style: italic;
        color: #c7c7c7;
        margin-bottom: 10px;
        font-size: 18px;
      }

      .intro-header__big-type {
        font-size: 130px;
        line-height: 0.9;
        font-weight: 400;

        position: relative;
        z-index: 2;

        margin-right: -120px;
      }

      /* CENTER IMAGE */
      .intro-pic-primary {
        position: relative;
        z-index: 1;
      }

      .intro-pic-primary::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to right,
          rgba(11, 12, 12, 0.85) 0%,
          rgba(11, 12, 12, 0.5) 40%,
          rgba(11, 12, 12, 0.2) 70%,
          rgba(11, 12, 12, 0.1) 100%
        );

        z-index: 2;
        pointer-events: none;
      }

      .intro-pic-primary img {
        width: 100%;
        /* width: 400px; */
        height: 520px;
        object-fit: cover;
      }

      /* RIGHT SIDE */
      .intro-block-content {
        display: flex;
        flex-direction: column;
        gap: 25px;
      }

      .intro-block-content__pic img {
        width: 100%;
        height: 160px;
        object-fit: cover;
      }

      .intro-block-content__text {
        color: #bfc3c7;
        line-height: 1.7;
        font-size: 16px;
      }

      /*  RESPONSIVE  */
      @media (max-width: 1024px) {
        .s-intro__content {
          grid-template-columns: 1fr;
        }

        .intro-header__big-type {
          font-size: 70px;
        }

        .intro-pic-primary img {
          height: 350px;
        }
      }
    </style>
  </head>

  <body>
    <!-- HEADER -->
    <header class="s-header">
      <div class="s-header__content">
        <div class="header-logo">
          <img src="public/images/Bh_ logo.png" alt="Blissfully Logo" />
        </div>

        <nav class="header-nav">
          <ul class="header-nav__links">
            <li class="current"><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Sanctuaries</a></li>
            <li><a href="#">Contact</a></li>
          </ul>

          <a href="" class="header-contact__num"> Join Now </a>
        </nav>
      </div>
    </header>

    <!-- INTRO -->
    <section class="s-intro">
      <div class="s-intro__content">
        <!-- LEFT -->
        <div>
          <div class="intro-header__overline">Welcome to</div>
          <h1 class="intro-header__big-type">
            Blissfully <br />
            Healing
          </h1>
        </div>

        <!-- CENTER IMAGE -->
        <div class="intro-pic-primary">
          <img
            src="https://images.pexels.com/photos/5240733/pexels-photo-5240733.jpeg"
            alt="Coffee beans"
          />
        </div>

        <!-- RIGHT -->
        <div class="intro-block-content">
          <div class="intro-block-content__pic">
            <img
              src="https://images.pexels.com/photos/4577191/pexels-photo-4577191.jpeg"
              alt="Coffee cup"
            />
          </div>

          <p class="intro-block-content__text">
            An ancient practice for modern souls seeking transcendence through
            celestial energy alignment
          </p>
        </div>
      </div>
    </section>

    <script>
      const header = document.querySelector(".s-header");
      const intro = document.querySelector(".s-intro");

      window.addEventListener("scroll", () => {
        const triggerPoint = intro.offsetHeight - 100;

        if (window.scrollY > triggerPoint) {
          header.classList.add("scrolled");
        } else {
          header.classList.remove("scrolled");
        }
      });
    </script>
  </body>
</html>
