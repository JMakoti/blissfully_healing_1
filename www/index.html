<!doctype html>

    <link rel="stylesheet" href="../public/css/style.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg custom-navbar">
      <div class="container">
        <a class="navbar-brand" href="#"> Blissfully Healing </a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarContent"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div
          class="collapse navbar-collapse justify-content-between"
          id="navbarContent"
        >
          <ul class="navbar-nav mx-auto mb-2 mb-lg-0 gap-lg-4">
            <li class="nav-item">
              <a class="nav-link active" href="#">Courses</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">Retreats</a>

            <li class="nav-item">
              <a class="nav-link" href="#">Support</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">About</a>

          <button class="nav-btn ms-lg-3">Get Started</button>
        </div>

        <div

          <div class="pellet p3"></div>

              An ancient practice for modern souls seeking transcendence through
              celestial energy alignment
            </p>
          </div>
        </div>

          <div class="fixed-img">
            <img
              src="https://images.unsplash.com/photo-1506126613408-eca07ce68773?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8bWVkaXRhdGlvbnxlbnwwfHwwfHx8MA%3D%3D"
              alt="fixed"
            />

              src="https://images.unsplash.com/photo-1506126613408-eca07ce68773?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8bWVkaXRhdGlvbnxlbnwwfHwwfHx8MA%3D%3D"
            />
            <img
              src="https://media.tacdn.com/media/attractions-splice-spp-674x446/0b/1e/25/13.jpg"

            <img
              src="https://images.squarespace-cdn.com/content/v1/5d8745cbb819022cf4593368/27403fbc-6088-4995-8d88-2c40b1aaa806/Clearing.jpg?format=2500w"
            />
            <img
              src="https://images.unsplash.com/photo-1506126613408-eca07ce68773?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8bWVkaXRhdGlvbnxlbnwwfHwwfHx8MA%3D%3D"
            />

            />

        </div>
      </div>

    <!-- Js -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      window.addEventListener("scroll", function () {
        const navbar = document.querySelector(".custom-navbar");
        navbar.classList.toggle("scrolled", window.scrollY > 50);
      });
    </script>
